<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Evaluación Médica - SEDES</title>
</head>
<body class="container mt-4">
    <h2 class="text-danger">Evaluación Médica Profesional</h2>
    <div class="row">
        <div class="col-md-5">
            <div class="alert alert-info">
                <h5>Antecedentes de Laboratorio</h5>
                <p><strong>Copro:</strong> {{ lab.copropasitologico }}</p>
                <p><strong>Frotis:</strong> {{ lab.frotis_faringeo }}</p>
                <p><strong>VDRL/Chagas:</strong> {{ lab.vdr_chagas }}</p>
            </div>
        </div>
        <div class="col-md-7">
            <form method="POST" class="card card-body shadow">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Presión Arterial:</label>
                    <input type="text" name="presion" class="form-control" placeholder="120/80">
                </div>
                <div class="row">
                    <div class="col"><label>Peso (Kg):</label><input type="number" step="0.1" name="peso" class="form-control"></div>
                    <div class="col"><label>Talla (cm):</label><input type="number" name="talla" class="form-control"></div>
                </div>
                <div class="mb-3 mt-3">
                    <label>Observaciones:</label>
                    <textarea name="observaciones" class="form-control"></textarea>
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" name="apto" class="form-check-input" id="checkApto">
                    <label class="form-check-label" for="checkApto"><strong>¿ES APTO PARA EL CARNET?</strong></label>
                </div>
                <button type="submit" class="btn btn-danger w-100">Finalizar Evaluación</button>
            </form>
        </div>
    </div>
</body>
</html>
