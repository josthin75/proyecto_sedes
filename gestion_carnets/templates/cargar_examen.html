<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Cargar Laboratorio - SEDES</title>
</head>
<body class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h4>Resultados de Laboratorio: {{ beneficiario.nombre }} {{ beneficiario.apellido }}</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Copropasitológico:</label>
                    <input type="text" name="copro" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Frotis Faríngeo:</label>
                    <input type="text" name="frotis" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>VDRL / Chagas:</label>
                    <input type="text" name="vdr" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Fecha de Examen:</label>
                    <input type="date" name="fecha" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success">Guardar Resultados</button>
                <a href="{% url 'inicio' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
